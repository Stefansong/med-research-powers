# Journal Formatting Templates Library
# Comprehensive requirements for major medical journals, organized by specialty.
# Use journal-selection to determine target journal, then apply the matching template.
#
# How to use:
#   1. Find target journal by id or name
#   2. Apply word_limit, abstract format, reference style, section structure
#   3. Check special requirements (Key Points box, Reporting Summary, etc.)
#   4. If journal not listed → use WebSearch to find "Instructions for Authors"
#
# How to contribute:
#   Add new entries following the same structure. Keep alphabetical within each category.
#   Fields: id, journal, publisher, IF_approx, word_limit, abstract, references,
#           figures, tables, sections, special, cover_letter, orcid, system

templates:

  # ═══════════════════════════════════════════════
  # GENERAL MEDICAL — Top Tier (IF > 30)
  # ═══════════════════════════════════════════════

  - id: nature
    journal: Nature
    publisher: Springer Nature
    IF_approx: 64
    word_limit: 3000 (excluding Methods)
    abstract: unstructured, ≤150 words
    references: ≤50, Nature style (numbered, superscript)
    figures: ≤6 main + Extended Data
    tables: ≤3
    sections: "Abstract, Introduction (no heading), Results, Discussion, Methods, References"
    special:
      - "No Introduction heading — text flows from abstract"
      - "Extended Data figures/tables (≤10) reviewed but not in main"
      - "Supplementary Information for additional data"
      - "Reporting Summary checklist required"
      - "Data and Code availability statements required"
    cover_letter: required
    orcid: required
    system: Editorial Manager

  - id: nature-medicine
    journal: Nature Medicine
    publisher: Springer Nature
    IF_approx: 82
    word_limit: 3000 (excluding Methods)
    abstract: unstructured, ≤150 words
    references: ≤50, Nature style (numbered, superscript)
    figures: ≤8 main, unlimited supplementary
    figure_format: "TIFF/EPS/PDF, ≥300 DPI, max 20MB per file"
    tables: ≤4
    sections: "Abstract, Introduction, Results, Discussion, Methods, References"
    special:
      - "Reporting Summary checklist required"
      - "Data availability statement required"
      - "Code availability statement required"
      - "Life Sciences Reporting Summary required"
    cover_letter: required
    orcid: required
    system: Editorial Manager

  - id: lancet
    journal: The Lancet
    publisher: Elsevier
    IF_approx: 169
    word_limit: 3000
    abstract: structured (Background, Methods, Findings, Interpretation, Funding), ≤300 words
    references: ≤30, Vancouver (numbered)
    figures: ≤5 (combined figures + tables)
    figure_format: "TIFF/EPS, ≥300 DPI"
    tables: included in figure limit
    sections: "Summary, Introduction, Methods, Results, Discussion, Contributors, Declaration of interests, Acknowledgments, References"
    special:
      - "Research in Context panel required (Evidence before this study, Added value, Implications)"
      - "Contributors statement (not just Acknowledgments)"
      - "Appendix for supplementary tables/figures"
      - "Clinical trial registration number in abstract"
      - "Funding statement in abstract"
    cover_letter: required
    orcid: required
    system: Editorial Manager

  - id: nejm
    journal: New England Journal of Medicine
    publisher: NEJM Group
    IF_approx: 159
    word_limit: 2700
    abstract: structured (Background, Methods, Results, Conclusions), ≤250 words
    references: ≤40, NEJM style (numbered)
    figures: ≤4
    figure_format: "EPS/TIFF, ≥1000 DPI for line art"
    tables: ≤4
    sections: "Abstract, Introduction (no heading), Methods, Results, Discussion, References"
    special:
      - "Disclosure forms for ALL authors (ICMJE)"
      - "Data sharing statement required"
      - "Protocol must be available"
      - "Statistical analysis section in Methods"
    cover_letter: required
    orcid: required
