# ═══════════════════════════════════════════════
# FORMATTING DEFAULTS (apply if not overridden)
# ═══════════════════════════════════════════════

defaults:
  font: "Times New Roman or Arial, 12pt"
  spacing: double
  margins: "2.54 cm (1 inch) all sides"
  page_numbers: bottom center or bottom right
  line_numbers: continuous (most journals require for review)
  title_page:
    - Title (≤20 words recommended)
    - Running title (≤50 characters)
    - Authors (full names, numbered affiliations)
    - Affiliations
    - Corresponding author (name, email, address, phone)
    - ORCID (if required)
    - Word count (excluding abstract, references, tables, figure legends)
    - Number of figures and tables
    - Keywords (3-6, use MeSH terms when possible)
  reference_formats:
    vancouver: "Numbered in order of appearance, e.g., [1] Author AB, Author CD. Title. Journal. Year;Vol:Pages."
    ama: "Superscript numbered, similar to Vancouver but AMA manual style"
    nature: "Superscript numbered, abbreviated journal names"
    ieee: "Numbered in brackets [1], IEEE abbreviation style"

